vulnerabilities:
  - id: CVE-2025-1767
    statement: >
      GitRepo volume vulnerability - we don't use it and it might not
      receive a fix due to being a deprecated feature

misconfigurations:
  - id: AVD-DS-0002
    statement: >
      Image user should not be 'root'. Running containers with 'root'
      user can lead to a container escape situation. It is a best practice
      to run containers as non-root users, which can be done by adding a
      'USER' statement to the Dockerfile.

  - id: AVD-KSV-0017
    statement: initcontainers require privileged access

  - id: AVD-KSV-0048
    statement: >
      Do not allow update/create of a malicious pod. Device plugin
      operator requires access to daemonset creation etc.

  - id: AVD-KSV-0121
    statement: Some plugins require access to various host paths

  - id: AVD-KSV-0014
    statement: These are false detections for not setting "readOnlyFilesystem"

  - id: AVD-KSV-0118
    statement: >
      Trivy invalidly detects securityContext issues from yaml
      files that are patch files
